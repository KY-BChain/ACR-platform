# ACR Platform - Openllet Reasoner Microservice Configuration
# Version: 2.1.0
# Architecture: Distributed DAPP - "DATA STAYS. RULES TRAVEL."

#############################################################################
# APPLICATION
#############################################################################
spring.application.name=openllet-reasoner-service
server.port=8080

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

#############################################################################
# ONTOLOGY CONFIGURATION (Domain-Agnostic)
#############################################################################
# Supported domains: breast-cancer, lung-cancer, cardiology, etc.
acr.ontology.domain=${ACR_ONTOLOGY_DOMAIN:breast-cancer}

# Ontology base path (mounted volume in Docker)
acr.ontology.base-path=${ACR_ONTOLOGY_BASE_PATH:/config/ontologies}

# Ontology namespace IRI
acr.ontology.base-iri=${ACR_ONTOLOGY_BASE_IRI:https://medical-ai.org/ontologies/ACR#}

#############################################################################
# DATABASE (Local PostgreSQL - Patient data NEVER leaves hospital)
#############################################################################
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/acr_platform}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:acr_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

#############################################################################
# FLYWAY (Database Migrations)
#############################################################################
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

#############################################################################
# LOGGING
#############################################################################
logging.level.root=INFO
logging.level.org.acr.reasoner=DEBUG
logging.file.path=${LOGGING_FILE_PATH:/config/logs}
logging.file.name=${logging.file.path}/reasoner.log

#############################################################################
# ACTUATOR (Health Checks & Metrics)
#############################################################################
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

#############################################################################
# DEPLOYMENT METADATA
#############################################################################
acr.deployment.hospital-id=${HOSPITAL_ID:demo-hospital}
acr.deployment.hospital-name=${HOSPITAL_NAME:Demo Hospital}
acr.deployment.environment=${DEPLOYMENT_ENV:development}
