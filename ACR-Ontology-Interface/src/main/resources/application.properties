# ACR Ontology Interface Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/
spring.application.name=acr-ontology-interface

# Logging Configuration
logging.level.root=INFO
logging.level.com.blockenergy.acr.ontology=DEBUG
logging.level.org.semanticweb.owlapi=WARN
logging.level.com.clarkparsia.pellet=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/acr-ontology-interface.log
logging.file.max-size=10MB
logging.file.max-history=30

# Ontology Configuration
ontology.base=ontology/ACR_Ontology_full.owl
ontology.swrl.rules=ontology/acr_swrl_rules.swrl
ontology.sqwrl.queries=ontology/acr_sqwrl_queries.sqwrl
ontology.integrated=ontology/ACR_Ontology_Integrated.owl
ontology.auto-integrate=true

# Database Configuration
database.path=../acr-test-website/data/acr_clinical_trail.db

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Jackson Configuration
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false

# Actuator Configuration (optional)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Application Info
info.app.name=ACR Ontology Interface
info.app.description=ACR Clinical Ontology Reasoning Service with SWRL/SQWRL Integration
info.app.version=1.0.0
info.ontology.version=ACR_Ontology_full.owl
info.reasoner=Pellet 2.6.5
info.swrl.rules=22
info.sqwrl.queries=15
