# ACR Ontology Configuration
acr.ontology.base-path=../ACR-Ontology-v2
acr.ontology.ontology-file=ACR_Ontology_Full_v2_1.owl
acr.ontology.swrl-file=acr_swrl_rules_v2_1.swrl
acr.ontology.sqwrl-file=acr_sqwrl_queries_v2_1.sqwrl
acr.ontology.base-iri=https://medical-ai.org/ontologies/ACR#

# Server Configuration
server.port=8080

# Database Configuration - SQLite with 200 test patient records
spring.datasource.url=jdbc:sqlite:src/main/resources/data/acr_database.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging
logging.level.org.acr.platform=INFO
logging.level.org.springframework.boot.web=INFO
logging.level.org.springframework.data=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.semanticweb.owlapi=WARN
logging.level.openllet=INFO
