# ACR Ontology Configuration
acr.ontology.base-path=../ACR-Ontology-staging
acr.ontology.ontology-file=ACR_Ontology_Full.owl
acr.ontology.swrl-file=acr_swrl_rules.swrl
acr.ontology.base-iri=http://acr.platform/ontology#

# Server Configuration
server.port=8080

# Database Configuration - SQLite with 200 test patient records
spring.datasource.url=jdbc:sqlite:src/main/resources/data/acr_database.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging
logging.level.org.acr.platform=INFO
logging.level.org.springframework.boot.web=INFO
logging.level.org.springframework.data=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.semanticweb.owlapi=WARN
logging.level.openllet=WARN
