# ACR Platform - Hospital Deployment Stack
# Complete edge computing deployment for on-premise installation
# Architecture: "DATA STAYS. RULES TRAVEL."
#
# This stack deploys:
# 1. Openllet Reasoner Microservice (clinical reasoning)
# 2. Bayesian CDS Module (confidence scoring)
# 3. PostgreSQL Database (local audit/results storage)
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f         # View logs
#   docker-compose down            # Stop all services
#
# Data Privacy:
# - All patient data processed locally
# - No data transmitted externally
# - GDPR/HIPAA/Chinese compliance by design

version: '3.8'

services:
  
  #############################################################################
  # OPENLLET REASONER - Core clinical reasoning engine
  #############################################################################
  openllet-reasoner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acr-reasoner
    image: acr-platform/openllet-reasoner:2.1.0
    
    ports:
      - "8080:8080"  # Reasoner API (local hospital network only)
    
    environment:
      # Ontology configuration
      - ACR_ONTOLOGY_DOMAIN=breast-cancer
      - ACR_ONTOLOGY_BASE_PATH=/config/ontologies
      - ACR_ONTOLOGY_BASE_IRI=https://medical-ai.org/ontologies/ACR#
      
      # Database connection
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/acr_platform
      - SPRING_DATASOURCE_USERNAME=acr_admin
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-changeme_in_production}
      
      # JVM settings
      - JAVA_OPTS=-Xms512m -Xmx2g -XX:+UseG1GC
      
      # Logging
      - LOGGING_LEVEL_ORG_ACR=DEBUG
      - LOGGING_FILE_PATH=/config/logs
    
    volumes:
      # Ontology files (can be updated without rebuilding container)
      - ./ontologies:/config/ontologies:ro
      # Logs
      - reasoner-logs:/config/logs
    
    depends_on:
      postgres:
        condition: service_healthy
    
    networks:
      - acr-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
  
  #############################################################################
  # POSTGRESQL - Local data storage (audit logs, inference results)
  # Patient PII stored here NEVER leaves hospital premises
  #############################################################################
  postgres:
    image: postgres:15-alpine
    container_name: acr-postgres
    
    environment:
      - POSTGRES_DB=acr_platform
      - POSTGRES_USER=acr_admin
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme_in_production}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=en_US.UTF-8
    
    volumes:
      # Persistent data storage
      - postgres-data:/var/lib/postgresql/data
      # Initialization scripts
      - ./init-db:/docker-entrypoint-initdb.d:ro
    
    ports:
      - "5432:5432"  # Exposed for local admin access only
    
    networks:
      - acr-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acr_admin -d acr_platform"]
      interval: 10s
      timeout: 3s
      retries: 3

#############################################################################
# NETWORKS
#############################################################################
networks:
  acr-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

#############################################################################
# VOLUMES (persistent data)
#############################################################################
volumes:
  postgres-data:
    driver: local
  reasoner-logs:
    driver: local
