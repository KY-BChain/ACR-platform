version: '3.8'

services:
  acr-ontology-interface:
    build: .
    container_name: acr-ontology-reasoning
    ports:
      - "8080:8080"
    volumes:
      # Database from acr-test-website (read-only)
      - ../acr-test-website/data:/app/data:ro

      # Ontology files (read-only after integration)
      - ./src/main/resources/ontology:/app/ontology:ro

      # Logs (writable)
      - ./logs:/app/logs
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - DATABASE_PATH=/app/data/acr_clinical_trail.db
      - ONTOLOGY_PATH=/app/ontology/ACR_Ontology_Integrated.owl
      - JAVA_OPTS=-Xmx2g -Xms512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/reasoning/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - acr-network

networks:
  acr-network:
    driver: bridge
