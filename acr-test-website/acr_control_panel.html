<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACR Control Panel - 临床决策支持控制面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', sans-serif; 
            background: #f5f7fa;
            padding: 20px;
        }
        
        .dashboard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-title h1 { font-size: 28px; margin-bottom: 5px; }
        .header-title p { font-size: 14px; opacity: 0.9; }
        
        .refresh-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .btn-refresh {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-refresh:hover {
            background: white;
            color: #667eea;
        }
        
        /* Filter Section */
        .filter-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .filter-item select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-left: 4px solid;
        }
        
        .stat-card.primary { border-left-color: #667eea; }
        .stat-card.success { border-left-color: #48bb78; }
        .stat-card.warning { border-left-color: #ed8936; }
        .stat-card.danger { border-left-color: #e53e3e; }
        
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .stat-change {
            font-size: 13px;
            color: #666;
        }
        
        .stat-change.positive { color: #48bb78; }
        .stat-change.negative { color: #e53e3e; }
        
        /* Charts Section */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .chart-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .chart-card h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 18px;
        }
        
        .chart-placeholder {
            height: 300px;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
        }
        
        /* Patient List Table */
        .table-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .table-header h3 {
            font-size: 18px;
            color: #333;
        }
        
        .btn-export {
            background: #4299e1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .patient-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .patient-table th,
        .patient-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .patient-table th {
            background: #f8f9fa;
            font-weight: 600;
            font-size: 13px;
            color: #666;
        }
        
        .patient-table tbody tr:hover {
            background: #f8f9fa;
            cursor: pointer;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-luminalA { background: #bee3f8; color: #2c5282; }
        .badge-luminalB { background: #feebc8; color: #7c2d12; }
        .badge-her2 { background: #fed7d7; color: #742a2a; }
        .badge-tnbc { background: #e9d8fd; color: #44337a; }
        
        .badge-stage-I { background: #c6f6d5; color: #22543d; }
        .badge-stage-II { background: #feebc8; color: #7c2d12; }
        .badge-stage-III { background: #fed7d7; color: #742a2a; }
        .badge-stage-IV { background: #e9d8fd; color: #44337a; }
        
        .alert-icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            text-align: center;
            line-height: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 5px;
        }
        
        .alert-critical { background: #e53e3e; color: white; }
        .alert-high { background: #ed8936; color: white; }
        .alert-medium { background: #ecc94b; color: white; }
        
        /* Action Buttons in Table */
        .btn-view {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn-view:hover {
            background: #5568d3;
        }
        
        /* Loading State */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div style="text-align: center;">
            <div class="spinner"></div>
            <p style="color: white; margin-top: 20px;">加载数据中...</p>
        </div>
    </div>

    <!-- Header -->
    <div class="dashboard-header">
        <div class="header-title">
            <h1>🎛️ ACR临床决策支持控制面板</h1>
            <p>Advanced Clinical Reasoning - Multi-Patient Dashboard</p>
        </div>
        <div class="refresh-controls">
            <span style="font-size: 14px; opacity: 0.9;">最后更新: <span id="lastUpdate">--</span></span>
            <button class="btn-refresh" onclick="refreshDashboard()">🔄 刷新数据</button>
        </div>
    </div>

    <!-- Filter Panel -->
    <div class="filter-panel">
        <h3>📊 数据筛选</h3>
        <div class="filter-grid">
            <div class="filter-item">
                <label style="display: block; margin-bottom: 5px; font-size: 13px; color: #666;">分子分型</label>
                <select id="filterSubtype" onchange="applyFilters()">
                    <option value="">全部</option>
                    <option value="LuminalA">Luminal A</option>
                    <option value="LuminalB">Luminal B</option>
                    <option value="HER2">HER2+</option>
                    <option value="TripleNegative">三阴性</option>
                </select>
            </div>
            <div class="filter-item">
                <label style="display: block; margin-bottom: 5px; font-size: 13px; color: #666;">临床分期</label>
                <select id="filterStage" onchange="applyFilters()">
                    <option value="">全部</option>
                    <option value="I">I期</option>
                    <option value="II">II期</option>
                    <option value="III">III期</option>
                    <option value="IV">IV期</option>
                </select>
            </div>
            <div class="filter-item">
                <label style="display: block; margin-bottom: 5px; font-size: 13px; color: #666;">风险等级</label>
                <select id="filterRisk" onchange="applyFilters()">
                    <option value="">全部</option>
                    <option value="低危">低危</option>
                    <option value="中危">中危</option>
                    <option value="高危">高危</option>
                </select>
            </div>
            <div class="filter-item">
                <label style="display: block; margin-bottom: 5px; font-size: 13px; color: #666;">警报级别</label>
                <select id="filterAlert" onchange="applyFilters()">
                    <option value="">全部</option>
                    <option value="CRITICAL">紧急</option>
                    <option value="HIGH">高</option>
                    <option value="MEDIUM">中</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
        <div class="stat-card primary">
            <div class="stat-label">总患者数</div>
            <div class="stat-value" id="totalPatients">0</div>
            <div class="stat-change">较上月 <span class="positive" id="patientChange">+0</span></div>
        </div>
        
        <div class="stat-card success">
            <div class="stat-label">指南依从率</div>
            <div class="stat-value" id="adherenceRate">0%</div>
            <div class="stat-change">目标: >90%</div>
        </div>
        
        <div class="stat-card warning">
            <div class="stat-label">待MDT讨论</div>
            <div class="stat-value" id="pendingMDT">0</div>
            <div class="stat-change">本周新增 <span id="mdtChange">0</span></div>
        </div>
        
        <div class="stat-card danger">
            <div class="stat-label">紧急警报</div>
            <div class="stat-value" id="criticalAlerts">0</div>
            <div class="stat-change">需立即处理</div>
        </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
        <div class="chart-card">
            <h3>📊 分子分型分布</h3>
            <canvas id="subtypeChart" width="400" height="300"></canvas>
        </div>
        
        <div class="chart-card">
            <h3>📈 分期分布</h3>
            <canvas id="stageChart" width="400" height="300"></canvas>
        </div>
        
        <div class="chart-card">
            <h3>📉 治疗时间线合规性</h3>
            <canvas id="timelineChart" width="400" height="300"></canvas>
        </div>
        
        <div class="chart-card">
            <h3>🎯 质量指标趋势</h3>
            <canvas id="qualityChart" width="400" height="300"></canvas>
        </div>
    </div>

    <!-- Patient List Table -->
    <div class="table-card">
        <div class="table-header">
            <h3>📋 患者列表 (共 <span id="patientCount">0</span> 例)</h3>
            <button class="btn-export" onclick="exportData()">📥 导出Excel</button>
        </div>
        
        <table class="patient-table">
            <thead>
                <tr>
                    <th>病历号</th>
                    <th>姓名</th>
                    <th>年龄</th>
                    <th>分子分型</th>
                    <th>分期</th>
                    <th>推荐治疗</th>
                    <th>指南</th>
                    <th>警报</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="patientTableBody">
                <tr>
                    <td colspan="9" style="text-align: center; color: #999; padding: 40px;">
                        暂无数据，请点击"刷新数据"加载患者信息
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
 <!-- replaced by script below for auto-detec   const API_BASE_URL = 'http://localhost:3000/api' -->
        // Auto-detect environment
        const API_BASE_URL = window.location.hostname === 'localhost'
            ? 'http://localhost:5050/api'  // Local testing at port 5050
            : 'https://www.acragent.com/api';  // Production

        let allPatients = [];
        let filteredPatients = [];

        // Initialize dashboard on load
        document.addEventListener('DOMContentLoaded', () => {
            refreshDashboard();
        });

        // Refresh all dashboard data
        async function refreshDashboard() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            try {
                // Fetch all patients with their recommendations
                const response = await fetch(`${API_BASE_URL}/dashboard.php`);
                const data = await response.json();
                
                if (data.success) {
                    allPatients = data.data.patients;
                    filteredPatients = allPatients;
                    
                    updateStats(data.data.stats);
                    updateCharts(data.data.charts);
                    updatePatientTable();
                    updateLastUpdateTime();
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
                alert('无法加载数据，请确保后端服务运行中');
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        // Update statistics cards
        function updateStats(stats) {
            document.getElementById('totalPatients').textContent = stats.totalPatients || 0;
            document.getElementById('patientChange').textContent = `+${stats.newThisMonth || 0}`;
            document.getElementById('adherenceRate').textContent = `${stats.adherenceRate || 0}%`;
            document.getElementById('pendingMDT').textContent = stats.pendingMDT || 0;
            document.getElementById('mdtChange').textContent = stats.mdtThisWeek || 0;
            document.getElementById('criticalAlerts').textContent = stats.criticalAlerts || 0;
        }

        // Update charts (placeholder - would use Chart.js in production)
        function updateCharts(chartData) {
            // Chart implementation would go here
            // Using Chart.js or similar library
            console.log('Chart data:', chartData);
        }

        // Update patient table
        function updatePatientTable() {
            const tbody = document.getElementById('patientTableBody');
            document.getElementById('patientCount').textContent = filteredPatients.length;
            
            if (filteredPatients.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="9" style="text-align: center; color: #999; padding: 40px;">
                            没有符合筛选条件的患者
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = filteredPatients.map(patient => `
    <tr onclick="viewPatientDetail('${patient.id}')">
        <td>${patient['患者本地标识符'] || patient.id}</td>
        <td>${patient['患者姓名本地'] || patient.name || 'Unknown'}</td>
        <td>${patient['年龄推导'] || patient.age || '--'}</td>
        <td><span class="badge badge-${getSubtypeClass(patient.subtype)}">${patient.subtype || '--'}</span></td>
        <td><span class="badge badge-stage-${patient.stage || 'I'}">${patient.stage || '--'}期</span></td>
        <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
            ${patient.recommendedTreatment || '--'}
        </td>
        <td>${patient.guidelineSource || 'CSCO'}</td>
        <td>
            ${patient.alertLevel ? `<span class="alert-icon alert-${patient.alertLevel.toLowerCase()}">${patient.alertCount || 0}</span>` : '--'}
        </td>
        <td>
            <button class="btn-view" onclick="viewPatientDetail('${patient.id}'); event.stopPropagation();">
                查看详情
            </button>
        </td>
    </tr>
`).join('');
        }

        // Apply filters
        function applyFilters() {
            const subtype = document.getElementById('filterSubtype').value;
            const stage = document.getElementById('filterStage').value;
            const risk = document.getElementById('filterRisk').value;
            const alert = document.getElementById('filterAlert').value;
            
            filteredPatients = allPatients.filter(patient => {
                if (subtype && patient.subtype !== subtype) return false;
                if (stage && patient.stage !== stage) return false;
                if (risk && patient.riskLevel !== risk) return false;
                if (alert && patient.alertLevel !== alert) return false;
                return true;
            });
            
            updatePatientTable();
        }

        // View patient detail (opens individual CDS page)
        function viewPatientDetail(patientId) {
            if (!patientId) {
        alert('❌ Invalid patient ID');
        return;
        }
    
        console.log('Opening CDS for patient:', patientId);
    
        // Open CDS page with patient ID
        // const url = `CDS_UI_for_BC_pathway.html?patientId=${encodeURIComponent(patientId)}`;
        // Open test user data entry page with 12 tabs (FIX: added &autoLoad=true)
        const url = `acr_test_data.html?patientId=${encodeURIComponent(patientId)}&autoLoad=true`;
        window.open(url, '_blank', 'width=1400,height=900');
        }

        // Export data to Excel
        function exportData() {
            // Would implement Excel export here
            // Using SheetJS or similar library
            alert('导出功能开发中...');
        }

        // Helper functions
        function getSubtypeClass(subtype) {
            if (!subtype) return '';
            if (subtype.includes('Luminal A')) return 'luminalA';
            if (subtype.includes('Luminal B')) return 'luminalB';
            if (subtype.includes('HER2')) return 'her2';
            if (subtype.includes('Triple')) return 'tnbc';
            return '';
        }

        function updateLastUpdateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('lastUpdate').textContent = timeStr;
        }
    </script>
</body>
</html>
